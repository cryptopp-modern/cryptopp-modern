name: Branch Build and Test

on:
  workflow_dispatch:

jobs:
  # =============================================================================
  # CMake Builds
  # =============================================================================

  cmake-linux:
    name: CMake Linux (GCC)
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Configure
      run: cmake --preset=ci-linux

    - name: Build
      run: cmake --build build/ci-linux -j"$(nproc)"

    - name: Run validation tests
      run: ./build/ci-linux/cryptest.exe v

    - name: Run test vectors
      run: ./build/ci-linux/cryptest.exe tv all

  cmake-linux-gcc14:
    name: CMake Linux (GCC 14)
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install GCC 14 and Ninja
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-14 g++-14 ninja-build

    - name: Configure (GCC 14)
      env:
        CC: gcc-14
        CXX: g++-14
      run: cmake --preset=ci-linux

    - name: Build
      run: cmake --build build/ci-linux -j"$(nproc)"

    - name: Run validation tests
      run: ./build/ci-linux/cryptest.exe v

    - name: Run test vectors
      run: ./build/ci-linux/cryptest.exe tv all

  cmake-linux-clang19:
    name: CMake Linux (Clang 19)
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install Clang 19 and Ninja
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-19 ninja-build

    - name: Check CPU features
      run: |
        echo "=== CPU Information ==="
        lscpu | grep -E "Model name|Flags"
        echo ""
        echo "=== AVX512 Flags ==="
        if grep -q avx512f /proc/cpuinfo; then
          echo "AVX512F: SUPPORTED"
        else
          echo "AVX512F: NOT SUPPORTED"
        fi

    - name: Configure (Clang 19)
      env:
        CC: clang-19
        CXX: clang++-19
      run: cmake --preset=ci-linux

    - name: Build
      run: cmake --build build/ci-linux -j"$(nproc)"

    - name: Run validation tests
      run: ./build/ci-linux/cryptest.exe v

    - name: Run test vectors
      run: ./build/ci-linux/cryptest.exe tv all

  cmake-macos:
    name: CMake macOS (Clang)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install Ninja
      run: brew install ninja

    - name: Configure
      run: cmake --preset=ci-macos

    - name: Build
      run: cmake --build build/ci-macos -j"$(sysctl -n hw.ncpu)"

    - name: Run validation tests
      run: ./build/ci-macos/cryptest.exe v

    - name: Run test vectors
      run: ./build/ci-macos/cryptest.exe tv all

  cmake-windows:
    name: CMake Windows (MSVC)
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v5

    - name: Configure
      run: cmake --preset=ci-windows

    - name: Build
      run: cmake --build build/ci-windows --config Release

    - name: Run validation tests
      run: ./build/ci-windows/Release/cryptest.exe v

    - name: Run test vectors
      run: ./build/ci-windows/Release/cryptest.exe tv all

  cmake-windows-arm64:
    # ARM64 Windows host with the Visual Studio generator, covering issue #43:
    # MASM (ml64) A1000 when the generator writes ASM objects under a source
    # subdir. Builds for x64 (MASM active) and ARM64 (ASM disabled). Runners
    # ship Visual Studio 2022; the reporter hit it on 2026, so a pass here
    # covers the ARM64 host path but not the 2026-specific toolset.
    name: CMake Windows ARM64 host (MSVC, ${{ matrix.target }})
    runs-on: windows-11-arm
    strategy:
      fail-fast: false
      matrix:
        target: [x64, ARM64]

    steps:
    - uses: actions/checkout@v5

    - name: Configure (Visual Studio generator, ${{ matrix.target }} target)
      run: cmake -S . -B build/ci-win-arm -G "Visual Studio 17 2022" -A ${{ matrix.target }} -DCMAKE_BUILD_TYPE=Release -DCRYPTOPP_BUILD_TESTING=ON

    - name: Build
      run: cmake --build build/ci-win-arm --config Release

  cmake-no-asm:
    name: CMake No-ASM (Pure C++)
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Configure (No ASM)
      run: cmake --preset=no-asm

    - name: Build
      run: cmake --build build/no-asm -j"$(nproc)"

    - name: Run validation tests
      run: ./build/no-asm/cryptest.exe v

    - name: Run test vectors
      run: ./build/no-asm/cryptest.exe tv all

  cmake-install:
    name: CMake Install Test
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Configure
      run: cmake --preset=install-test

    - name: Build
      run: cmake --build build/install-test -j"$(nproc)"

    - name: Install
      run: cmake --install build/install-test

    - name: Verify installation
      run: |
        test -f build/install/lib/libcryptopp.a
        test -d build/install/include/cryptopp
        test -f build/install/include/cryptopp/aes.h
        test -f build/install/lib/cmake/cryptopp-modern/cryptopp-modernConfig.cmake
        # Both pkg-config names must resolve and yield usable flags; the
        # cryptopp-modern alias forwards to libcryptopp through Requires.
        export PKG_CONFIG_PATH="$PWD/build/install/lib/pkgconfig"
        pkg-config --exists libcryptopp
        pkg-config --exists cryptopp-modern
        pkg-config --cflags --libs libcryptopp
        pkg-config --cflags --libs cryptopp-modern
        test "$(pkg-config --libs cryptopp-modern)" = "$(pkg-config --libs libcryptopp)"
        # A mismatched libcryptopp.pc earlier in the path must not satisfy the
        # version-pinned alias; the lookup should fail rather than resolve to it.
        mkdir -p "$RUNNER_TEMP/fakepc"
        printf 'Name: libcryptopp\nDescription: mismatched\nVersion: 0.0.0\nCflags: -I/nonexistent\n' > "$RUNNER_TEMP/fakepc/libcryptopp.pc"
        if PKG_CONFIG_PATH="$RUNNER_TEMP/fakepc:$PWD/build/install/lib/pkgconfig" pkg-config --exists cryptopp-modern; then
          echo "ERROR: alias resolved through a mismatched libcryptopp.pc" >&2
          exit 1
        fi
        ls -la build/install/include/cryptopp/ | head -20

    - name: Test find_package integration
      run: |
        mkdir -p test-project && cd test-project
        cat > CMakeLists.txt << 'EOF'
        cmake_minimum_required(VERSION 3.20)
        project(test-cryptopp)
        find_package(cryptopp-modern REQUIRED)
        add_executable(test-app main.cpp)
        target_link_libraries(test-app PRIVATE cryptopp::cryptopp)
        EOF
        cat > main.cpp << 'EOF'
        #include <cryptopp/sha.h>
        #include <cryptopp/hex.h>
        #include <cryptopp/filters.h>
        #include <iostream>
        int main() {
            CryptoPP::SHA256 hash;
            std::string digest;
            CryptoPP::StringSource ss("test", true,
                new CryptoPP::HashFilter(hash,
                    new CryptoPP::HexEncoder(
                        new CryptoPP::StringSink(digest))));
            std::cout << "SHA256: " << digest << std::endl;
            return 0;
        }
        EOF
        cmake -B build -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install
        cmake --build build
        ./build/test-app

  cmake-shared:
    name: CMake Shared Library Test
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Configure (shared, tests on)
      run: >
        cmake -S . -B build/shared -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DCRYPTOPP_BUILD_SHARED=ON
        -DCRYPTOPP_BUILD_TESTING=ON
        -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/shared-install

    - name: Build
      run: cmake --build build/shared -j"$(nproc)"

    - name: Validate against the shared library
      run: |
        # cryptest links the .so, so a passing run proves the API is exported,
        # and cryptest itself must record a NEEDED entry for the ABI SONAME.
        cd build/shared
        LD_LIBRARY_PATH="$PWD" ./cryptest.exe v
        readelf -d ./cryptest.exe | grep -qE 'NEEDED.*libcryptopp\.so\.[0-9]+\]' \
          || { echo "ERROR: cryptest is not linked against the shared library"; exit 1; }

    - name: Install
      run: cmake --install build/shared

    - name: Verify SONAME, symlink chain and downstream consumers
      run: |
        INST="${{ github.workspace }}/build/shared-install"
        ABI=$(grep -oE 'define[ ]+CRYPTOPP_ABI_VERSION[ ]+[0-9]+' include/cryptopp/config_ver.h | grep -oE '[0-9]+$')
        REAL=$(find "$INST" -name 'libcryptopp.so.*' -type f | head -1)
        LIBDIR=$(dirname "$REAL")
        PCDIR=$(dirname "$(find "$INST" -name libcryptopp.pc | head -1)")
        SONAME=$(readelf -d "$REAL" | grep -oE 'libcryptopp\.so\.[0-9.]+' | head -1)
        echo "SONAME=$SONAME  file=$(basename "$REAL")  ABI=$ABI"
        # SONAME must be exactly the ABI version, not the release version.
        test "$SONAME" = "libcryptopp.so.$ABI" \
          || { echo "ERROR: SONAME $SONAME != libcryptopp.so.$ABI"; exit 1; }
        # Symlink chain: libcryptopp.so -> libcryptopp.so.$ABI -> real file.
        test "$(readlink "$LIBDIR/libcryptopp.so")" = "$SONAME"
        test "$(readlink "$LIBDIR/$SONAME")" = "$(basename "$REAL")"
        # The consumer calls an out-of-line longstanding symbol (SHA256) and an
        # out-of-line fork-added symbol (BLAKE3); a header-only call would not
        # prove the symbols are exported. Built at the project C++11 baseline.
        cat > consumer.cpp << 'EOF'
        #include <cryptopp/sha.h>
        #include <cryptopp/blake3.h>
        #include <cryptopp/cryptlib.h>
        #include <vector>
        using namespace CryptoPP;
        int main() {
            const byte msg[3] = {'a','b','c'};
            SHA256 sha; std::vector<byte> d1(sha.DigestSize());
            sha.CalculateDigest(d1.data(), msg, 3);
            BLAKE3 b3; std::vector<byte> d2(b3.DigestSize());
            b3.CalculateDigest(d2.data(), msg, 3);
            return (d1[0] == 0xba && d2[0] == 0x64) ? 0 : 1;  // digests of "abc"
        }
        EOF
        # Consumer A: pkg-config libcryptopp
        g++ -std=c++11 consumer.cpp \
          $(PKG_CONFIG_PATH="$PCDIR" pkg-config --cflags --libs libcryptopp) -o consumer_pc
        readelf -d consumer_pc | grep -qE "NEEDED.*$SONAME" \
          || { echo "ERROR: pkg-config consumer is not linked against $SONAME"; exit 1; }
        LD_LIBRARY_PATH="$LIBDIR" ./consumer_pc
        # Consumer B: find_package(cryptopp-modern)
        mkdir -p fp && cp consumer.cpp fp/ && cd fp
        cat > CMakeLists.txt << 'EOF'
        cmake_minimum_required(VERSION 3.20)
        project(consumer CXX)
        set(CMAKE_CXX_STANDARD 11)
        set(CMAKE_CXX_STANDARD_REQUIRED ON)
        set(CMAKE_CXX_EXTENSIONS OFF)
        find_package(cryptopp-modern REQUIRED)
        add_executable(consumer_fp consumer.cpp)
        target_link_libraries(consumer_fp PRIVATE cryptopp::cryptopp)
        EOF
        cmake -S . -B b -DCMAKE_PREFIX_PATH="$INST" > /dev/null
        cmake --build b > /dev/null
        readelf -d b/consumer_fp | grep -qE "NEEDED.*$SONAME" \
          || { echo "ERROR: find_package consumer is not linked against $SONAME"; exit 1; }
        LD_LIBRARY_PATH="$LIBDIR" ./b/consumer_fp
        echo "shared library consumers OK ($SONAME)"

    - name: GNUmakefile shared build SONAME parity
      run: |
        # The GNUmakefile is the other build system; its SONAME must match the
        # CMake one, since both derive from CRYPTOPP_ABI_VERSION.
        ABI=$(grep -oE 'define[ ]+CRYPTOPP_ABI_VERSION[ ]+[0-9]+' include/cryptopp/config_ver.h | grep -oE '[0-9]+$')
        make -j"$(nproc)" shared
        MK_REAL=$(find . -maxdepth 1 -name 'libcryptopp.so.*' -type f | head -1)
        MK_SONAME=$(readelf -d "$MK_REAL" | grep -oE 'libcryptopp\.so\.[0-9.]+' | head -1)
        echo "GNUmakefile SONAME=$MK_SONAME (file $(basename "$MK_REAL"))  ABI=$ABI"
        test "$MK_SONAME" = "libcryptopp.so.$ABI" \
          || { echo "ERROR: GNUmakefile SONAME $MK_SONAME != libcryptopp.so.$ABI"; exit 1; }

  makefile-macos-dylib:
    name: Makefile macOS dylib
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5

    - name: make dylib and check versions
      run: |
        # compatibility_version must be the ABI version; current_version keeps
        # the release version. macOS pads a bare version to X.Y.Z.
        ABI=$(grep -oE 'define[ ]+CRYPTOPP_ABI_VERSION[ ]+[0-9]+' include/cryptopp/config_ver.h | grep -oE '[0-9]+$')
        make -j"$(sysctl -n hw.ncpu)" dylib
        otool -l libcryptopp.dylib | grep -A5 LC_ID_DYLIB
        COMPAT=$(otool -l libcryptopp.dylib | awk '/LC_ID_DYLIB/{f=1} f&&/compatibility version/{print $3; exit}')
        CURRENT=$(otool -l libcryptopp.dylib | awk '/LC_ID_DYLIB/{f=1} f&&/current version/{print $3; exit}')
        echo "compatibility_version=$COMPAT  current_version=$CURRENT  ABI=$ABI"
        case "$COMPAT" in
          "$ABI"|"$ABI.0"|"$ABI.0.0") echo "compatibility_version matches ABI" ;;
          *) echo "ERROR: compatibility_version $COMPAT != ABI $ABI"; exit 1 ;;
        esac

  # =============================================================================
  # Makefile Builds (Backward Compatibility)
  # =============================================================================

  makefile-linux-gcc:
    name: Makefile Linux GCC ${{ matrix.gcc-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gcc-version: [11, 12, 13]
        cxx-standard: [14, 17, 20]

    steps:
    - uses: actions/checkout@v5

    - name: Install GCC ${{ matrix.gcc-version }}
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt-get update
        sudo apt-get install -y gcc-${{ matrix.gcc-version }} g++-${{ matrix.gcc-version }}

    - name: Build library (C++${{ matrix.cxx-standard }})
      run: |
        export CXX=g++-${{ matrix.gcc-version }}
        export CXXFLAGS="-DNDEBUG -g2 -O3 -std=c++${{ matrix.cxx-standard }}"
        make clean
        make -j"$(nproc)"

    - name: Run validation tests
      run: ./cryptest.exe v

    - name: Run test vectors
      run: ./cryptest.exe tv all

  makefile-linux-gcc-legacy:
    name: Makefile Linux GCC ${{ matrix.gcc-version }} (Legacy)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        gcc-version: [9, 10]
        cxx-standard: [14, 17]

    steps:
    - uses: actions/checkout@v5

    - name: Install GCC ${{ matrix.gcc-version }}
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-${{ matrix.gcc-version }} g++-${{ matrix.gcc-version }}

    - name: Build library (C++${{ matrix.cxx-standard }})
      run: |
        export CXX=g++-${{ matrix.gcc-version }}
        export CXXFLAGS="-DNDEBUG -g2 -O3 -std=c++${{ matrix.cxx-standard }}"
        make clean
        make -j"$(nproc)"

    - name: Run validation tests
      run: ./cryptest.exe v

    - name: Run test vectors
      run: ./cryptest.exe tv all

  makefile-linux-clang-legacy:
    name: Makefile Linux Clang ${{ matrix.clang-version }} (Legacy)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        clang-version: [13, 14]
        cxx-standard: [14, 17]

    steps:
    - uses: actions/checkout@v5

    - name: Install Clang ${{ matrix.clang-version }}
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ matrix.clang-version }}

    - name: Build library (C++${{ matrix.cxx-standard }})
      run: |
        export CXX=clang++-${{ matrix.clang-version }}
        export CXXFLAGS="-DNDEBUG -g2 -O3 -std=c++${{ matrix.cxx-standard }}"
        make clean
        make -j"$(nproc)"

    - name: Run validation tests
      run: ./cryptest.exe v

    - name: Run test vectors
      run: ./cryptest.exe tv all

  makefile-linux-clang-old:
    name: Makefile Linux Clang ${{ matrix.clang-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        clang-version: [15, 16, 17]
        cxx-standard: [14, 17, 20]

    steps:
    - uses: actions/checkout@v5

    - name: Install Clang ${{ matrix.clang-version }}
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh ${{ matrix.clang-version }}
        sudo apt-get install -y clang-${{ matrix.clang-version }}

    - name: Build library (C++${{ matrix.cxx-standard }})
      run: |
        export CXX=clang++-${{ matrix.clang-version }}
        export CXXFLAGS="-DNDEBUG -g2 -O3 -std=c++${{ matrix.cxx-standard }}"
        make clean
        make -j"$(nproc)"

    - name: Run validation tests
      run: ./cryptest.exe v

    - name: Run test vectors
      run: ./cryptest.exe tv all

  makefile-linux-clang-new:
    name: Makefile Linux Clang ${{ matrix.clang-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        clang-version: [18, 19]
        cxx-standard: [14, 17, 20]

    steps:
    - uses: actions/checkout@v5

    - name: Install Clang ${{ matrix.clang-version }}
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ matrix.clang-version }}

    - name: Build library (C++${{ matrix.cxx-standard }})
      run: |
        export CXX=clang++-${{ matrix.clang-version }}
        export CXXFLAGS="-DNDEBUG -g2 -O3 -std=c++${{ matrix.cxx-standard }}"
        make clean
        make -j"$(nproc)"

    - name: Run validation tests
      run: ./cryptest.exe v

    - name: Run test vectors
      run: ./cryptest.exe tv all

  makefile-macos:
    name: Makefile macOS (Apple Clang)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        cxx-standard: [14, 17, 20]

    steps:
    - uses: actions/checkout@v5

    - name: Build library (C++${{ matrix.cxx-standard }})
      run: |
        export CXXFLAGS="-DNDEBUG -g2 -O3 -std=c++${{ matrix.cxx-standard }} -stdlib=libc++"
        make clean
        make -j"$(sysctl -n hw.ncpu)"

    - name: Run validation tests
      run: ./cryptest.exe v

    - name: Run test vectors
      run: ./cryptest.exe tv all

  makefile-windows-msvc:
    name: Makefile Windows MSVC
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, Win32]
        configuration: [Release]

    steps:
    - uses: actions/checkout@v5

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build library and tests
      run: msbuild cryptest.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m

    - name: Run validation tests
      shell: cmd
      run: ${{ matrix.platform }}\Output\${{ matrix.configuration }}\cryptest.exe v

    - name: Run test vectors
      shell: cmd
      run: ${{ matrix.platform }}\Output\${{ matrix.configuration }}\cryptest.exe tv all

  # =============================================================================
  # Sanitizer Builds
  # =============================================================================

  sanitizers:
    name: Sanitizer ${{ matrix.sanitizer }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [ubsan, asan]

    steps:
    - uses: actions/checkout@v5

    - name: Install GCC 13
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-13 g++-13

    - name: Build with ${{ matrix.sanitizer }}
      run: |
        export CXX=g++-13
        make clean
        make ${{ matrix.sanitizer }} -j"$(nproc)"

    - name: Run validation tests
      run: ./cryptest.exe v 2>&1 | tee validation.log

    - name: Run test vectors
      run: ./cryptest.exe tv all 2>&1 | tee -a validation.log

    - name: Check for sanitizer errors
      run: |
        if grep -E "(runtime error:|ERROR:|ASAN)" validation.log; then
          echo "Sanitizer errors found"
          exit 1
        fi

  # =============================================================================
  # AVX512 Testing
  # =============================================================================

  avx512-test:
    name: AVX512 Feature Test
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Check CPU features
      run: |
        echo "=== CPU Information ==="
        lscpu | grep -E "Model name|Flags"
        echo ""
        echo "=== AVX512 Flags ==="
        if grep -q avx512f /proc/cpuinfo; then
          echo "AVX512F: SUPPORTED"
        else
          echo "AVX512F: NOT SUPPORTED"
        fi
        if grep -q avx512vl /proc/cpuinfo; then
          echo "AVX512VL: SUPPORTED"
        else
          echo "AVX512VL: NOT SUPPORTED"
        fi

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Configure
      run: cmake --preset=ci-linux

    - name: Build
      run: cmake --build build/ci-linux -j"$(nproc)"

    - name: Run validation tests
      run: ./build/ci-linux/cryptest.exe v

    - name: Run test vectors
      run: ./build/ci-linux/cryptest.exe tv all
